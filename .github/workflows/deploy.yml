name: JusticeAI CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: justice
          POSTGRES_PASSWORD: justicepassword
          POSTGRES_DB: justiceai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
      redis:
        image: redis:7
        ports:
          - 6379:6379
          
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest pytest-asyncio
        
    - name: Run Pytest Benchmarks
      env:
        DATABASE_URL: postgresql://justice:justicepassword@localhost:5432/justiceai_test
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        cd backend
        pytest ../tests/
