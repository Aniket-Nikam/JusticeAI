version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: justice
      POSTGRES_PASSWORD: justicepassword
      POSTGRES_DB: justiceai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: always

  neo4j:
    image: neo4j:5.20.0
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    restart: always

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://justice:justicepassword@db:5432/justiceai
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - db
      - neo4j
      - redis
    volumes:
      - ./justice_data:/app/data
    restart: always

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
  neo4j_data:
