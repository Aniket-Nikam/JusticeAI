version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: justice
      POSTGRES_PASSWORD: justicepassword
      POSTGRES_DB: justiceai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: always

  neo4j:
    image: neo4j:5.20.0
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    restart: always

volumes:
  postgres_data:
  neo4j_data:
